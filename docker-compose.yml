services:
  mlt:
    image: ghcr.io/x-t-e-r/my-little-todo:latest
    # build: .    # Uncomment to build from source instead
    ports:
      - "3001:3001"
    volumes:
      - ./data:/app/data
    environment:
      - PORT=3001
      - AUTH_MODE=multi
      - DB_TYPE=sqlite
      - JWT_SECRET=${JWT_SECRET:-please-change-me}
      # - DEFAULT_ADMIN_PASSWORD=admin123
    restart: unless-stopped

