services:
  mlt:
    build: .
    ports:
      - "3001:3001"
    volumes:
      - mlt-data:/app/data
    environment:
      - PORT=3001
      - AUTH_MODE=multi
      - DB_TYPE=sqlite
      - JWT_SECRET=change-me-to-a-random-string
      # - DEFAULT_ADMIN_PASSWORD=admin123
    restart: unless-stopped

