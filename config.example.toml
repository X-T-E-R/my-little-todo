# My Little Todo — Server Configuration
# Copy this file to `config.toml` and edit as needed.
# Environment variables override TOML values when set.

port = 3001
host = "0.0.0.0"

# Auth provider:
# - "embedded": out-of-box username/password auth with multi-user + admin panel
# - "zitadel": optional external OIDC/OAuth enhancement
auth_provider = "embedded"

# Embedded signup policy:
# - "invite_only": admin creates invite codes, users self-register with an invite
# - "open": anyone can self-register after initial setup
# - "admin_only": only admins can create users
embedded_signup_policy = "invite_only"

# Hosted sync is the only runtime mode:
# all clients connect to the same My Little Todo server and share the same backend data.
sync_mode = "hosted"

# Storage backend: "sqlite" | "postgres"
# SQLite is the default out-of-box shared backend.
db_type = "sqlite"
data_dir = "./data"

# Optional database URL.
# Leave empty to use ./data/my-little-todo.db with sqlite.
# database_url = "postgres://postgres:postgres@localhost:5432/my_little_todo"

# Optional Zitadel / OIDC configuration.
# These are only required when auth_provider = "zitadel".
# zitadel_issuer = "https://zitadel.example.com"
# zitadel_client_id = "web"
# zitadel_audience = "api://mlt"
# zitadel_admin_role = "mlt-admin"

# Optional static frontend directory
# static_dir = "./static"

# Optional CORS allowlist for browser clients hosted on another origin
# cors_allowed_origins = ["http://localhost:5173"]

# Optional admin export directories
# admin_export_dirs = ["./exports"]
