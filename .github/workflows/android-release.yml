name: Build & Release Android APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  android:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: 'pnpm'

      - name: Install frontend dependencies
        run: pnpm install

      - name: Build core package
        run: pnpm turbo run build --filter=@my-little-todo/core

      - name: Build mobile web assets
        run: pnpm --filter @my-little-todo/mobile build

      - name: Sync Capacitor
        run: pnpm --filter @my-little-todo/mobile exec npx cap sync android

      # Do not use `if: env.SECRET` — secrets are only injected per-step; job env never sees them, so decode was always skipped.
      - name: Decode keystore (when MLT_KEYSTORE_BASE64 is set)
        env:
          MLT_KEYSTORE_BASE64: ${{ secrets.MLT_KEYSTORE_BASE64 }}
        run: |
          if [ -z "$MLT_KEYSTORE_BASE64" ]; then
            echo "No MLT_KEYSTORE_BASE64 secret; building unsigned release APK"
            exit 0
          fi
          echo "$MLT_KEYSTORE_BASE64" | base64 -d > packages/mobile/android/app/release.keystore

      - name: Build release APK
        env:
          MLT_KEYSTORE_PASSWORD: ${{ secrets.MLT_KEYSTORE_PASSWORD }}
          MLT_KEY_ALIAS: ${{ secrets.MLT_KEY_ALIAS }}
          MLT_KEY_PASSWORD: ${{ secrets.MLT_KEY_PASSWORD }}
        working-directory: packages/mobile/android
        run: |
          if [ -f app/release.keystore ]; then
            export MLT_KEYSTORE_FILE=release.keystore
          fi
          chmod +x gradlew
          ./gradlew assembleRelease

      - name: Determine version
        id: version
        run: echo "version=$(node -p 'require(\"./packages/mobile/package.json\").version')" >> "$GITHUB_OUTPUT"

      - name: Rename APK
        run: |
          cp packages/mobile/android/app/build/outputs/apk/release/app-release*.apk \
             my-little-todo-v${{ steps.version.outputs.version }}-android.apk

      - name: Upload to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: my-little-todo-v${{ steps.version.outputs.version }}-android.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifact (manual dispatch)
        if: "!startsWith(github.ref, 'refs/tags/v')"
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: my-little-todo-v${{ steps.version.outputs.version }}-android.apk
